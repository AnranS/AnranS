name: Generate Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Overview card: lifetime activity, repos contributed to, isocalendar.
      # metrics commits the SVG straight into the `output` branch — no extra
      # publish step. main stays clean.
      - name: Overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AnranS
          filename: metrics.svg
          committer_branch: output
          committer_message: "ci(metrics): refresh overview"
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Languages card: replaces the broken github-readme-stats top-langs.
      - name: Languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AnranS
          filename: metrics-languages.svg
          committer_branch: output
          committer_message: "ci(metrics): refresh languages"
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
